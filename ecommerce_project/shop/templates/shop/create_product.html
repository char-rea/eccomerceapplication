{% extends "base.html" %}

{% block title %}Add Product{% endblock %}

{% block content %}

<h1>Add Product to {{ store.name }}</h1>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">
        Save Product
    </button>
</form>

<br>

<a href="{% url 'shop:store_products' pk=store.pk %}">
    ← Back to Products
</a>

{% endblock %}
