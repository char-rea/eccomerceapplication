{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<div class="card">
    <h1>Create Store</h1>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="name" placeholder="Store name" required>
        <br><br>
        <textarea name="description" placeholder="Description"></textarea>
        <br><br>
        <button class="btn" type="submit">Create</button>
    </form>
</div>
{% endblock %}
