{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<h1>Reset your password</h1>

<p>Enter your email address and we’ll send you a reset link.</p>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send reset email</button>
</form>
{% endblock %}
